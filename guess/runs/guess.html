<!DOCTYPE html>
<html>
    <head>
        <title>C++ Game</title>
        <link rel="icon" type="image/x-icon" href="ask.png">
        <script type="text/javascript">
            const worker = new Worker('/worker.js', { type: 'module' });
            worker.onerror = (event) => {
                console.log("MaLa Worker Error: ", event);
                console.error("Message: ", event.message);
            }

            window.addEventListener('DOMContentLoaded', () => {
                var guess = document.getElementById("guess");
                var result = document.getElementById("result");

                guess.addEventListener("keydown", function(event) {
                    if (event.key === "Enter") {
                        add_output("your guess> " + guess.value);
                        worker.postMessage(guess.value);
                        guess.value = "";
                    };
                })

                function add_output(text) {
                    result.value += text + "\n";
                    result.scrollTop = result.scrollHeight;
                }

//                worker.onmessage = (e) => { console.log(e.data) };
                worker.onmessage = (e) => { add_output(e.data); };
            });
        </script>
    </head>
    <body>
        <br>
        <p>Welcome to the Number Guessing Game!</p>
        <input type="text" id="guess" size="50" placeholder="Please enter your guess (1-100)">
        <br>
        <h4>Output</h4>
        <textarea id="result" rows="50" cols="80" readonly> </textarea>
    </body>
</html>
