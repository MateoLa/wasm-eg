<!DOCTYPE html>
<html>
    <head>
        <title>SF Wasm</title>
        <link rel="icon" type="image/x-icon" href="sf_128.png">
        <script type="text/javascript">
            var Module = {
                preRun: function() {
                    function stdin() {
//                        let code = input.str.charCodeAt(input.index++);
//                        return isNaN(code) ? null : code;
                        return 77;
                    };

                    FS.init(stdin, null, null);
                },
                send_command: (data) => { Module.wasm_uci_execute(data) },
                onRuntimeInitialized: function() {
                    console.log('Module loaded: ', Module);
//                    const wasm_uci_execute = Module.cwrap("wasm_uci_execute", "void", []);
                    Module.wasm_uci_execute("");
                }
            };
        </script>
        <script type="text/javascript">
            window.addEventListener('DOMContentLoaded', (event) => {
                const output = document.getElementById("output");
                const command = document.getElementById("command");

                function add_output(text) {
                    output.value += text + "\n";
                    output.scrollTop = output.scrollHeight;
                }

                Module.read_stdout = add_output;

                function send_command() {
                    add_output("input> " + command.value);
                    Module.send_command(command.value);
                    command.value = "";
                }

                command.addEventListener("keydown", (event) => {
                    if (event.key === "Enter") send_command();
                });
            });
        </script>
        <script src="sf.js" type="text/javascript"></script>
    </head>

    <body>
        <br>
        <input type="text" id="command" size="50" placeholder="Please enter an UCI command">
        <input type="button" value="SendCommand" onclick="send_command()" />
        <br />
        <h4>Output</h4>
        <textarea id="output" readonly rows="50" cols="100"> </textarea>
    </body>    
</html>
