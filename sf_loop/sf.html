<!DOCTYPE html>
<html>
    <head>
        <title>SF Wasm</title>
        <link rel="icon" type="image/x-icon" href="sf_128.png">
        <script type="text/javascript">
            const worker = new Worker('/worker.js', { type: 'module' });
            worker.onerror = (event) => { console.log("MaLa worker error: ", event.message); };

            window.addEventListener('DOMContentLoaded', () => {
                var command = document.getElementById("command");
                var output = document.getElementById("output");

                command.addEventListener("keydown", function(event) {
                    if (event.key === "Enter") {
                        add_output("Your input> " + command.value);
                        worker.postMessage(command.value);
                        command.value = "";
                    };
                })

                function add_output(text) {
                    output.value += text + "\n";
                    output.scrollTop = output.scrollHeight;
                }

                worker.onmessage = (e) => { add_output(e.data); };
         });
        </script>
    </head>

    <body>
        <br>
        <input type="text" id="command" size="50" placeholder="Please enter an UCI command">
        <br />
        <h4>Output</h4>
        <textarea id="output" readonly rows="50" cols="80"> </textarea>
    </body>    
</html>
